# === Application ===
spring.application.name=businessai-backend
server.port=30234
server.address: 0.0.0.0
# === MongoDB ===
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:27017/businessai_db
spring.data.mongodb.database=businessai_db

# === FastAPI (IA) ===
ai.fastapi.base-url=http://${IA_BASE_URL:127.0.0.1:8004}
ai.chatbot.base-url=http://${IA_CHATBOT_URL:127.0.0.1:8003}
fastapi.base-url=${ai.fastapi.base-url}
fastapi.chatbot-base-url=${ai.chatbot.base-url}

jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast32Characters
jwt.expiration=86400000

# === Logs ===
logging.level.org.springframework.data.mongodb=DEBUG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === JSON dates ===
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
