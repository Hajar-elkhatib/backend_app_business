# === Application ===
spring.application.name=businessai-backend
server.port=30234
server.address=0.0.0.0

# === MongoDB (🟢 Clean Routing f l-Prod) ===
spring.data.mongodb.uri=mongodb://mongodb-service:27017/businessai_db
spring.data.mongodb.database=businessai_db

# === FastAPI / IA (🟢 Clean Routing f l-Prod) ===
ai.fastapi.base-url=http://model-ia:8000
ai.chatbot.base-url=http://model-ia:8002
fastapi.base-url=${ai.fastapi.base-url}
fastapi.chatbot-base-url=${ai.chatbot.base-url}

# === Security ===
jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast32Characters
jwt.expiration=86400000

# === Logs ===
logging.level.org.springframework.data.mongodb=DEBUG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === JSON dates ===
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
