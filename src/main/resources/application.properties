# === Application ===
spring.application.name=businessai-backend
server.port=30234
server.address: 0.0.0.0
# === MongoDB ===
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:27017/businessai_db
spring.data.mongodb.database=businessai_db

# === FastAPI (IA) ===
fastapi.base-url=http://${IA_BASE_URL:localhost:8000}
fastapi.chatbot-base-url=http://${IA_CHATBOT_URL:localhost:8002}

jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast32Characters
jwt.expiration=86400000

# === Logs ===
logging.level.org.springframework.data.mongodb=DEBUG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === JSON dates ===
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
